services:
  db:
    image: postgres:16-alpine
    container_name: sakukoperasi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sakukoperasi_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sakukoperasi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./sakukoperasi
    container_name: sakukoperasi-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-sakukoperasi_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./sakukoperasi:/app

volumes:
  postgres_data:
